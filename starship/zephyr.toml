# zephyr.toml - Zephyr default prompt theme

add_newline = false

# A minimal left prompt
#format = """$python$directory$character"""

# move the rest of the prompt to the right
#right_format = """$status$git_branch${custom.git_status_dirty}$git_status"""
#right_format = """$status$cmd_duration$git_branch${custom.git_status_dirty}$git_status"""

format = '$all'

palette="tokyo_night"
# palette="wombat"

# Define custom colors
[palettes.tokyo_night]
black = '#15161e'
blue = '#7aa2f7'
cyan = '#7dcfff'
green = '#9ece6a'
purple = '#bb9af7'
orange = '#ff9e64'
red = '#f7768e'
white = '#a9b1d6'
yellow = '#e0af68'

[palettes.wombat]
black = '#000000'
blue = '#5da9f6'
cyan = '#82fff7'
green = '#b1e969'
purple = '#e86aff'
orange = '#ff615a'
red = '#ff615a'
white = '#dedacf'
yellow = '#ebd99c'

[character]
# success_symbol = "[❯](blue)[❯](purple)"
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[python]
format = '[(\($virtualenv\) )]($style)'
style = 'white'

[directory]
style = "blue"
truncation_length = 1
truncation_symbol = ""
fish_style_pwd_dir_length = 3

# right prompt uses left space padding
[git_branch]
format = '[$branch]($style) '
style = 'yellow'

[git_status]
format = '$ahead_behind$stashed'
ahead = '[⬆${count}](bold purple) '
behind = '[⬇${count}](bold purple) '
staged = '[✚${count}](green) '
deleted = '[✖${count}](red) '
renamed = '[➜${count}](purple) '
stashed = '[≡${count}](cyan) '
untracked = '[◼${count}](white) '
modified = '[✱${count}](blue) '
conflicted = '[═${count}](yellow) '
diverged = '⇕ '
up_to_date = ''


[custom.git_status_dirty]
when = 'test -n "$(git status --porcelain 2>/dev/null)"'
symbol = ' *'
style = "red"
format="[$symbol]($style)"
shell = ["sh"]

[cmd_duration]
format = '[$duration]($style)'

[username]
show_always = true
style_user = "purple"
style_root = "orange"
format = '[ $user ]($style)'

[line_break]
disabled = true

[status]
disabled = false
symbol = ' ✘'
